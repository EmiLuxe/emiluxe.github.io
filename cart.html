<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Carrito - EmiLuxe</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <!-- NAVBAR -->
  <nav>
    <a href="index.html" class="navbar-logo">
      <img src="assets/images/logo.png" alt="EmiLuxe Logo">
      EmiLuxe
    </a>
    <ul class="navbar-menu">
      <li><a href="index.html">Inicio</a></li>
      <li><a href="shop.html">Tienda</a></li>
    </ul>
    <div class="navbar-icons">
      <button onclick="window.openDrawer()" style="background: none; border: none; font-size: 1.5rem; cursor: pointer; position: relative;">
        🛒
        <span class="cart-badge">0</span>
      </button>
      <a href="login.html">👤</a>
    </div>
  </nav>

  <!-- CART SECTION -->
  <section class="cart-container">
    <h1 class="cart-title">🛒 Tu Carrito</h1>

    <div id="cartContent">
      <!-- Cart items will be loaded here -->
    </div>
  </section>

  <!-- CARRITO DRAWER (MODAL LATERAL) ✨ NUEVO ✨ -->
  <div id="cartDrawerOverlay"></div>
  <div id="cartDrawer">
    <div class="cart-drawer-header">
      <h2>Tu Carrito</h2>
      <button class="cart-drawer-close" onclick="window.closeDrawer()">✕</button>
    </div>

    <div id="cartDrawerEmpty" class="show">
      <div class="empty-icon">🛒</div>
      <h3>Carrito Vacío</h3>
      <p>Agrega productos para comenzar</p>
    </div>

    <div id="cartDrawerItems"></div>

    <div class="cart-drawer-footer">
      <div id="cartDrawerTotal"></div>
    </div>
  </div>

  <!-- BOTÓN WHATSAPP FLOTANTE -->
  <div class="whatsapp-button" onclick="openWhatsApp()">
    <span class="whatsapp-icon">💬</span>
    <div class="whatsapp-tooltip">Escríbenos 💕</div>
  </div>

  <!-- FOOTER -->
  <footer>
    <p>&copy; 2026 EmiLuxe. Todos los derechos reservados. | Hecho con ❤️ para ti</p>
  </footer>

  <script src="js/cart.js"></script>
  <script src="js/main.js"></script>
  <script>
    // Renderizar carrito ✨ MEJORADO ✨
    function renderCart() {
      const cartContent = document.getElementById('cartContent');
      const cart = getCart();

      if (cart.length === 0) {
        cartContent.innerHTML = `
          <div class="cart-empty">
            <p>Tu carrito está vacío 😢</p>
            <p style="margin-top: 1rem;">
              <a href="shop.html" style="color: var(--dark-pink); text-decoration: none; font-weight: 600;">Continuar comprando →</a>
            </p>
          </div>
        `;
        return;
      }

      let cartHTML = '<div class="cart-items">';
      
      cart.forEach(item => {
        const sizeText = item.size ? `<p style="color: #999; font-size: 0.85rem; margin: 0.3rem 0 0 0;">Talla: <strong>${item.size}</strong></p>` : '';
        
        cartHTML += `
          <div class="cart-item">
            <img src="${item.image}" alt="${item.name}" class="cart-item-image" onerror="this.src='assets/images/placeholder.png'">
            <div class="cart-item-details">
              <h3 class="cart-item-name">${item.name}</h3>
              <p class="cart-item-price">${formatPrice(item.price)}</p>
              ${sizeText}
              <div class="quantity-control">
                <button onclick="decreaseQuantity('${item.cartItemId || item.id}')">−</button>
                <input type="number" value="${item.quantity}" readonly>
                <button onclick="increaseQuantity('${item.cartItemId || item.id}')">+</button>
              </div>
              <button class="remove-btn" onclick="removeProductFromCart('${item.cartItemId || item.id}')">Eliminar</button>
            </div>
          </div>
        `;
      });

      cartHTML += '</div>';

      // Cart Summary
      const total = getCartTotal();
      cartHTML += `
        <div class="cart-summary">
          <div class="summary-row">
            <span>Subtotal:</span>
            <span>${formatPrice(total)}</span>
          </div>
          <div class="summary-row">
            <span>Envío:</span>
            <span>${total >= 80000 ? 'Gratis ✓' : 'Calculado en checkout'}</span>
          </div>
          <div class="summary-row total">
            <span>Total:</span>
            <span>${formatPrice(total)}</span>
          </div>
          <a href="checkout.html" class="checkout-btn" style="text-decoration: none; display: block; text-align: center;">
            💳 Completar Pedido
          </a>
          <a href="shop.html" style="display: block; text-align: center; margin-top: 0.8rem; color: var(--dark-pink); text-decoration: none; font-weight: 600;">
            Continuar comprando
          </a>
        </div>
      `;

      cartContent.innerHTML = cartHTML;
    }

    // Aumentar cantidad
    window.increaseQuantity = function(cartItemId) {
      const cart = getCart();
      const item = cart.find(p => (p.cartItemId || p.id) === cartItemId);
      if (item) {
        updateQuantity(cartItemId, item.quantity + 1);
        renderCart();
      }
    }

    // Disminuir cantidad
    window.decreaseQuantity = function(cartItemId) {
      const cart = getCart();
      const item = cart.find(p => (p.cartItemId || p.id) === cartItemId);
      if (item && item.quantity > 1) {
        updateQuantity(cartItemId, item.quantity - 1);
        renderCart();
      }
    }

    // Eliminar del carrito
    window.removeProductFromCart = function(cartItemId) {
      if (confirm('¿Deseas eliminar este producto del carrito?')) {
        removeFromCart(cartItemId);
        renderCart();
        showNotification('Producto eliminado del carrito', 'success');
      }
    }

    // Abrir WhatsApp
    window.openWhatsApp = function() {
      const phoneNumber = '573164321234'; // ⚠️ REEMPLAZA CON TU NÚMERO
      const message = encodeURIComponent('Hola EmiLuxe, tengo una consulta 💕');
      window.open(`https://wa.me/${phoneNumber}?text=${message}`, '_blank');
    }

    // Cargar carrito al abrir página
    document.addEventListener('DOMContentLoaded', () => {
      renderCart();
    });
  </script>
</body>
</html>
