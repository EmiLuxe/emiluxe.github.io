<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mis Órdenes - EmiLuxe</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
  <style>
    .orders-container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 20px;
    }
    
    .order-card {
      background: white;
      border: 1px solid #e0e0e0;
      border-radius: 12px;
      padding: 15px;
      margin-bottom: 15px;
      display: grid;
      gap: 10px;
    }
    
    .order-header {
      display: flex;
      flex-wrap: wrap;
      justify-content: space-between;
      align-items: start;
      gap: 10px;
      border-bottom: 1px solid #f0f0f0;
      padding-bottom: 10px;
    }
    
    .order-id {
      font-weight: 600;
      color: var(--dark-pink);
      font-size: 14px;
      word-break: break-all;
    }
    
    .order-status {
      padding: 6px 12px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 500;
      white-space: nowrap;
    }
    
    .status-confirmed {
      background-color: #d4edda;
      color: #155724;
    }
    
    .status-pending {
      background-color: #fff3cd;
      color: #856404;
    }
    
    .order-details {
      display: grid;
      gap: 8px;
      font-size: 13px;
    }
    
    .detail-row {
      display: flex;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 10px;
    }
    
    .detail-label {
      font-weight: 500;
      color: #666;
      min-width: 100px;
    }
    
    .detail-value {
      color: #333;
      word-break: break-word;
    }
    
    /* RESPONSIVE MOBILE */
    @media (max-width: 768px) {
      .orders-container {
        padding: 10px;
      }
      
      .order-card {
        padding: 12px;
        margin-bottom: 12px;
      }
      
      .order-header {
        flex-direction: column;
        gap: 8px;
      }
      
      .order-id {
        font-size: 12px;
      }
      
      .detail-row {
        flex-direction: column;
        gap: 5px;
      }
      
      .detail-label {
        min-width: auto;
      }
    }
  </style>
</head>
<body>
  <!-- NAVBAR -->
  <nav>
    <a href="index.html" class="navbar-logo">
      <img src="assets/images/logo.png" alt="EmiLuxe Logo">
      EmiLuxe
    </a>
    <ul class="navbar-menu">
      <li><a href="index.html">Inicio</a></li>
      <li><a href="shop.html">Tienda</a></li>
    </ul>
    <div class="navbar-icons">
      <a href="cart.html" style="position: relative;">
        🛒
        <span class="cart-badge">0</span>
      </a>
    </div>
  </nav>

  <!-- MAIN CONTENT -->
  <main class="orders-container">
    <h1>Mis Órdenes</h1>
    <input type="text" id="phoneInput" placeholder="Ingresa tu teléfono para ver tus órdenes" 
           style="width: 100%; padding: 10px; margin-bottom: 20px; border: 1px solid #ddd; border-radius: 8px;">
    <button onclick="searchOrders()" 
            style="background-color: var(--dark-pink); color: white; padding: 10px 20px; border: none; border-radius: 8px; cursor: pointer;">
      Buscar Órdenes
    </button>
    
    <div id="ordersContainer" style="margin-top: 20px;">
      <!-- Las órdenes se cargarán aquí -->
    </div>
  </main>

  <!-- FOOTER -->
  <footer>
    <p>&copy; 2026 EmiLuxe. Todos los derechos reservados. | Hecho con ❤️ para ti</p>
  </footer>

  <script src="js/cart.js"></script>
  <script src="js/main.js"></script>
  <script type="module">
    import { getOrdersByPhoneFromFirebase } from './js/orders.js';

    window.searchOrders = async function() {
      const phone = document.getElementById('phoneInput').value.trim();
      
      if (!phone || phone.length < 10) {
        alert('Por favor ingresa un número de teléfono válido');
        return;
      }

      try {
        const orders = await getOrdersByPhoneFromFirebase(phone);
        displayOrders(orders);
      } catch (error) {
        console.error('Error buscando órdenes:', error);
        document.getElementById('ordersContainer').innerHTML = 
          '<p style="color: red;">Error cargando órdenes. Intenta de nuevo.</p>';
      }
    };

    function displayOrders(orders) {
      const container = document.getElementById('ordersContainer');
      
      if (orders.length === 0) {
        container.innerHTML = '<p style="text-align: center; color: #999;">No se encontraron órdenes</p>';
        return;
      }

      container.innerHTML = orders.map(order => `
        <div class="order-card">
          <div class="order-header">
            <span class="order-id">Orden #${order.orderId}</span>
            <span class="order-status ${order.status?.includes('Confirmada') ? 'status-confirmed' : 'status-pending'}">
              ${order.status || 'Pendiente'}
            </span>
          </div>
          <div class="order-details">
            <div class="detail-row">
              <span class="detail-label">Teléfono:</span>
              <span class="detail-value">${order.phoneNumber || 'No disponible'}</span>
            </div>
            <div class="detail-row">
              <span class="detail-label">Cliente:</span>
              <span class="detail-value">${order.customerName || 'No disponible'}</span>
            </div>
            <div class="detail-row">
              <span class="detail-label">Total:</span>
              <span class="detail-value">${formatPrice(order.total)}</span>
            </div>
            <div class="detail-row">
              <span class="detail-label">Fecha:</span>
              <span class="detail-value">${new Date(order.date).toLocaleDateString('es-CO')}</span>
            </div>
          </div>
        </div>
      `).join('');
    }

    function formatPrice(price) {
      return new Intl.NumberFormat('es-CO', {
        style: 'currency',
        currency: 'COP',
        minimumFractionDigits: 0
      }).format(price);
    }
  </script>
</body>
</html>
