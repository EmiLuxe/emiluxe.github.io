<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tienda - EmiLuxe</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <!-- NAVBAR -->
  <nav>
    <a href="index.html" class="navbar-logo">
      <img src="assets/images/logo.png" alt="EmiLuxe Logo">
      EmiLuxe
    </a>
    <ul class="navbar-menu">
      <li><a href="index.html">Inicio</a></li>
      <li><a href="shop.html">Tienda</a></li>
    </ul>
    <div class="navbar-icons">
      <button id="cartButton" onclick="window.openDrawer(); event.stopPropagation();" style="background: none; border: none; font-size: 1.5rem; cursor: pointer; position: relative;">
        🛒
        <span class="cart-badge">0</span>
      </button>
      <a href="login.html">👤</a>
    </div>
  </nav>

  <!-- PRODUCTOS SECTION -->
  <section class="products-section">
    <h1>Nuestra Tienda</h1>

    <!-- FILTER CONTROLS -->
    <div class="filter-controls">
      <button class="filter-btn active" onclick="window.filterProducts('pijamas')">Pijamas</button>
      <button class="filter-btn" onclick="window.filterProducts('lenceria')">Lencería</button>
      <button class="filter-btn" onclick="window.filterProducts('casual')">Ropa casual</button>
      <button class="filter-btn" onclick="window.filterProducts('perfumeria')">Perfumería</button>
    </div>

    <!-- LOADING INDICATOR -->
    <div id="loadingSpinner" style="text-align: center; padding: 2rem; display: none;">
      <p style="color: #999;">Cargando productos...</p>
    </div>

    <!-- PRODUCTS GRID -->
    <div class="products-grid" id="productsGrid">
      <!-- Products will be loaded here by JavaScript -->
    </div>
  </section>

  <!-- CARRITO DRAWER (MODAL LATERAL) -->
  <div id="cartDrawerOverlay"></div>
  <div id="cartDrawer">
    <div class="cart-drawer-header">
      <h2>Tu Carrito</h2>
      <button class="cart-drawer-close" onclick="window.closeDrawer()">✕</button>
    </div>

    <div id="cartDrawerEmpty" class="show">
      <div class="empty-icon">🛒</div>
      <h3>Carrito Vacío</h3>
      <p>Agrega productos para comenzar</p>
      <a href="shop.html">Continuar Comprando</a>
    </div>

    <div id="cartDrawerItems"></div>

    <div class="cart-drawer-footer">
      <div id="cartDrawerTotal"></div>
      <button id="cartDrawerCheckoutBtn" onclick="window.goToCheckout()" style="display: none;">
        Ir a Checkout
      </button>
    </div>
  </div>

  <!-- BOTÓN WHATSAPP FLOTANTE -->
  <div class="whatsapp-button" onclick="openWhatsApp()">
    <span class="whatsapp-icon">💬</span>
    <div class="whatsapp-tooltip">Escríbenos 💕</div>
  </div>

  <!-- FOOTER -->
  <footer>
    <p>&copy; 2026 EmiLuxe. Todos los derechos reservados. | Hecho con ❤️ para ti</p>
  </footer>

  <script src="js/cart.js"></script>
  <script src="js/main.js"></script>
  <script type="module">
    import { getAllProducts } from './js/products.js';

    let currentFilter = 'pijamas';
    let allProductsData = [];

    // Render products on page load
    document.addEventListener('DOMContentLoaded', async () => {
      const selectedCategory = localStorage.getItem('selectedCategory');
      if (selectedCategory) {
        currentFilter = selectedCategory.toLowerCase();
        localStorage.removeItem('selectedCategory');
        updateActiveFilter();
      }
      
      await renderProducts();
    });

    // Render products grid
    window.renderProducts = async function() {
      const productsGrid = document.getElementById('productsGrid');
      const loadingSpinner = document.getElementById('loadingSpinner');

      loadingSpinner.style.display = 'block';

      try {
        const allProducts = await getAllProducts();
        allProductsData = allProducts;

        const productsToDisplay = allProducts.filter(p => 
          p.category.toLowerCase() === currentFilter.toLowerCase()
        );

        loadingSpinner.style.display = 'none';

        if (productsToDisplay.length === 0) {
          productsGrid.innerHTML = '<div class="no-products"><p>No hay productos disponibles en esta categoría</p></div>';
          return;
        }

        productsGrid.innerHTML = productsToDisplay.map(product => {
          const badgeHTML = product.badges && product.badges.length > 0 
            ? `<div class="product-badge">${product.badges[0]}</div>` 
            : '';
          const stockText = product.stock && product.stock <= 3 
            ? `<p class="product-stock-text">⚡ Stock bajo</p>` 
            : '';

          return `
            <div class="product-card">
              ${badgeHTML}
              <img 
                src="${product.image}" 
                alt="${product.name}" 
                class="product-image" 
                onerror="this.src='https://via.placeholder.com/400x500?text=Sin+Imagen'"
                loading="lazy"
              >
              <div class="product-info">
                <p class="product-category">${product.category}</p>
                <h3 class="product-name">${product.name}</h3>
                <p class="product-description">${product.description}</p>
                ${stockText}
                <div class="product-footer">
                  <span class="product-price">${formatPrice(product.price)}</span>
                  <button class="add-to-cart-btn" onclick="window.addProductToCart('${product.id}')">
                    Agregar
                  </button>
                </div>
              </div>
            </div>
          `;
        }).join('');
      } catch (error) {
        console.error('Error renderizando productos:', error);
        loadingSpinner.style.display = 'none';
        productsGrid.innerHTML = '<div class="no-products"><p>Error al cargar productos. Intenta nuevamente.</p></div>';
      }
    }

    // Filter products
    window.filterProducts = async function(category) {
      currentFilter = category;
      updateActiveFilter();
      await renderProducts();
    }

    // Update active filter button
    function updateActiveFilter() {
      const buttons = document.querySelectorAll('.filter-btn');
      buttons.forEach(btn => {
        btn.classList.remove('active');
        const btnCategory = btn.textContent.toLowerCase();
        const currentCategory = currentFilter.toLowerCase();
        
        if (
          (btnCategory.includes('pijamas') && currentCategory === 'pijamas') ||
          (btnCategory.includes('lencería') && currentCategory === 'lenceria') ||
          (btnCategory.includes('casual') && currentCategory === 'casual') ||
          (btnCategory.includes('perfumería') && currentCategory === 'perfumeria')
        ) {
          btn.classList.add('active');
        }
      });
    }

    // Add product to cart
    window.addProductToCart = async function(productId) {
      try {
        const product = allProductsData.find(p => p.id === productId);

        if (product) {
          addToCart(product, 1);
          showNotification(`${product.name} agregado al carrito 🛒`, 'success');
          // Abrir el drawer al agregar
          window.openDrawer();
        } else {
          showNotification('Producto no encontrado', 'error');
        }
      } catch (error) {
        console.error('Error agregando producto:', error);
        showNotification('Error al agregar producto', 'error');
      }
    }

    // Go to checkout
    window.goToCheckout = function() {
      window.location.href = 'checkout.html';
    }

    // Abrir WhatsApp
    window.openWhatsApp = function() {
      const phoneNumber = '573117965474';
      const message = encodeURIComponent('Hola EmiLuxe, tengo una consulta 💕');
      window.open(`https://wa.me/${phoneNumber}?text=${message}`, '_blank');
    }
  </script>
</body>
</html>
